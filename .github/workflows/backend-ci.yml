name: Backend CI

on: [push]

jobs:
  backend-validation:
    name: Backend Tests & Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Compile project
        working-directory: ./back
        run: |
          mvn -v
          echo "Compiling backend project"
          mvn clean compile

      - name: Run tests with coverage
        working-directory: ./back
        run: |
          echo "Running backend tests with JaCoCo coverage"
          mvn clean test

      - name: Verify coverage report generation
        working-directory: ./back
        run: |
          echo "Checking coverage report"
          if [ -d "target/site/jacoco" ]; then
            echo "✅ JaCoCo coverage report generated successfully!"
            ls -la target/site/jacoco/
          else
            echo "❌ Coverage report not found!"
            exit 1
          fi

      - name: Package application
        working-directory: ./back
        run: |
          echo "📦 Packaging backend application..."
          mvn package -DskipTests

      - name: Verify JAR creation
        working-directory: ./back
        run: |
          echo "📦 Checking JAR file..."
          if ls target/*.jar 1> /dev/null 2>&1; then
            echo "✅ JAR file created successfully!"
            ls -lh target/*.jar
          else
            echo "❌ JAR file not found!"
            exit 1
          fi

      - name: Summary
        run: |
          echo "✅ Backend validation completed successfully!"
          echo "📊 Coverage report available in artifacts"
          echo "📦 JAR package created and uploaded"

  sonarqube-backend:
    name: SonarQube backend analysis
    runs-on: ubuntu-latest
    needs: backend-validation

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: "zulu"
      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Build and analyze
        working-directory: ./back
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=KpryKorn_projet-10-ci-cd
