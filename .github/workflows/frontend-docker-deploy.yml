name: Frontend Docker Build & Push

on:
  push:
    branches:
      - main
    paths:
      - "front/**"

jobs:
  frontend-docker-deploy:
    name: Construction et publication image Docker
    runs-on: ubuntu-latest
    environment:
      name: production-frontend

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Configuration de Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Configuration de QEMU
        uses: docker/setup-qemu-action@v2

      - name: Connexion à Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extraction des métadonnées pour le frontend
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/bobapp-frontend
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Publication de l'image Docker frontend sur Docker Hub
        uses: docker/build-push-action@v4
        with:
          context: ./front
          file: ./front/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/bobapp-frontend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/bobapp-frontend:buildcache,mode=max

      - name: Résumé de la publication frontend
        run: |
          echo "✅ Pipeline de déploiement Docker frontend terminée avec succès!"
          echo ""
          echo ""
          echo "🐳 Image Docker frontend publiée sur Docker Hub:"
          echo "📦 Application: ${{ secrets.DOCKERHUB_USERNAME }}/bobapp-frontend"
          echo ""
          echo "🏷️ Tags:"
          echo "${{ steps.meta.outputs.tags }}"
