name: Backend Docker Build & Push

on:
  workflow_run:
    workflows: ["Backend CI"]
    types:
      - completed

jobs:
  backend-docker-deploy:
    name: Construction et publication image Docker
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Configuration de Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Configuration de QEMU
        uses: docker/setup-qemu-action@v2

      - name: Connexion à Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extraction des métadonnées pour le backend
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/bobapp-backend
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Publication de l'image Docker backend sur Docker Hub
        uses: docker/build-push-action@v4
        with:
          context: ./back
          file: ./back/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/bobapp-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/bobapp-backend:buildcache,mode=max

      - name: Résumé de la publication backend
        run: |
          echo "✅ Pipeline de déploiement Docker backend terminée avec succès!"
          echo ""
          echo ""
          echo "🐳 Image Docker backend publiée sur Docker Hub:"
          echo "📦 Application: ${{ secrets.DOCKERHUB_USERNAME }}/bobapp-backend"
          echo ""
          echo "🏷️ Tags:"
          echo "${{ steps.meta.outputs.tags }}"
